<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0b1521" />
  <meta name="description" content="Turn-based cellular tactics puzzle game — contain, eliminate, and outsmart pathogens!" />
  <title>Bio Defence</title>
  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; }
    body {
      background:
        radial-gradient(circle at 20% 15%, rgba(0,229,255,0.14), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(255,215,64,0.08), transparent 20%),
        linear-gradient(180deg, #07111d 0%, #040913 100%);
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      max-width: 460px;
      margin: 0 auto;
      position: relative;
    }
    #game-container::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 24px 80px rgba(0,0,0,0.42),
        inset 0 1px 0 rgba(255,255,255,0.04);
      pointer-events: none;
    }
    canvas {
      border-radius: 26px;
      overflow: hidden;
      image-rendering: auto;
      transform: translateZ(0);
      backface-visibility: hidden;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Register PWA service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then(
          (reg) => console.log("SW registered:", reg.scope),
          (err) => console.warn("SW registration failed:", err)
        );
      });
    }
  </script>
</body>
</html>
